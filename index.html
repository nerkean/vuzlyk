<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuzlyk</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f9f9f9, #e6e6e6);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .background-images {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.20;
        }

        .background-images img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: fadeInOut 16s infinite;
        }

        .background-images img:nth-child(1) {
            animation-delay: 0s;
        }

        .background-images img:nth-child(2) {
            animation-delay: 4s;
        }

        .background-images img:nth-child(3) {
            animation-delay: 8s;
        }

        .background-images img:nth-child(4) {
            animation-delay: 12s;
        }

        @keyframes fadeInOut {
            0%, 25% {
                opacity: 0;
                transform: scale(1.05);
            }
            12%, 22% {
                opacity: 1;
            }
            75%, 100% {
                opacity: 0;
                transform: scale(1.1);
            }
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 16px;
            background: #fefefe;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1.5s ease-in-out;
            position: relative;
            z-index: 1;
        }

        .header {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 12px;
        }

        .header img {
            width: 100%;
            object-fit: cover;
            height: 100%;
            border-radius: 12px;
        }

        h1 {
            margin: 30px 0;
            font-size: 2.5rem;
            color: #222;
        }

        .icons {
            margin: 25px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .icons a {
            display: inline-block;
            width: 50px;
            height: 50px;
            background-size: cover;
            border-radius: 8px;
            transition: transform 0.4s, box-shadow 0.4s;
            position: relative;
        }

        .icons a:hover {
            transform: scale(1.0);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            animation: rubberBand 1s;
        }

        .icons a .social-name {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .icons a:hover .social-name {
            opacity: 1;
            visibility: visible;
        }

        .icons a.instagram {
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png');
        }

        .icons a.tiktok {
            background-image: url('https://cdn4.iconfinder.com/data/icons/social-media-flat-7/64/Social-media_Tiktok-512.png');
        }

        .icons a.email {
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Gmail_icon_%282020%29.svg/1280px-Gmail_icon_%282020%29.svg.png');
        }

        .icons a.telegram {
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg');
        }

        .icons a.instagram .social-name {
            content: 'Instagram';
        }

        .icons a.tiktok .social-name {
            content: 'TikTok';
        }

        .icons a.email .social-name {
            content: 'Email';
        }

        .icons a.telegram .social-name {
            content: 'Telegram';
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="background-images">
        <img src="balloon.jpg" alt="Background Image 1">
        <img src="459678996_3648160008830152_6736640986903926006_n.jpg"alt="Background Image 2">
        <img src="471431083_1342849060229652_3140089062188228881_n.jpg" alt="Background Image 3">
        <img src="elephant1.jpg" alt="Background Image 4">
        <img src="439262769_1406649540041188_7477038134928483344_n.jpg" alt="Background Image 5">
        <img src="419712974_1462449451315449_5332432343368613093_n.jpg" alt="Background Image 6">
        <img src="453342682_890979299530880_2289604756007166114_n.jpg" alt="Background Image 7">
        <img src="valentyna_embroidery_1736547683775.jpeg" alt="Background Image 8">
    </div>
    <div class="container animate__animated animate__fadeInUp">
        <div class="header">
            <img src="xorCfQT4tT2YSgQjEbAkoH.jpg" alt="Header Image">
        </div>
        <div class="icons animate__animated animate__tada">
            <a href="https://www.instagram.com/valentyna_embroidery?igsh=MW15OWN2cGY4dG55MA%3D%3D" target="_blank" class="instagram" aria-label="Instagram"><span class="social-name">Instagram</span></a>
            <a href="https://www.tiktok.com/@valentyna_embroidery?_t=8qEMVFVc0Yf&_r=1" target="_blank" class="tiktok" aria-label="TikTok"><span class="social-name">TikTok</span></a>
            <a href="mailto:valya_yur@ukr.net" target="_blank" class="email" aria-label="Email"><span class="social-name">Email</span></a>
            <a href="https://t.me/Valya_yurch" target="_blank" class="telegram" aria-label="Telegram"><span class="social-name">Telegram</span></a>
        </div>
    </div>
</body>
</html>
